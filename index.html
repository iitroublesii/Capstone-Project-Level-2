<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="app.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Capstone-Project-Level-2</title>
</head>

<body class="bg-[#20063B] min-h-screen flex items-center justify-center p-4">
    <div class="max-w-xl w-full bg-[#CC3363] shadow-lg rounded-lg p-6 flex flex-col">
        <h1 class="text-2xl font-bold mb-4 text-center">Mini AI Chatbot</h1>

        <div id="chatBox" class="h-96 overflow-y-auto border rounded p-4 flex flex-col gap-2 mb-4 bg-white"></div>

        <div class="flex gap-2">
            <input id="userInput" type="text" placeholder="Ask a question..."
                class="text-[#20063B] bg-white font-bold flex-1 border rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-400">

            <button type="button" id="sendBtn" class="bg-[#20063B] text-[#CC3363] px-6 py-2 rounded">Send</button>

        </div>
    </div>
</body>

</html>
